// ── Helpers ───────────────────────────────────────────────────
function fmtM(n){const a=Math.abs(n);if(a>=1e6)return(n<0?"-":"")+"$"+(a/1e6).toFixed(2)+"M";if(a>=1e3)return(n<0?"-":"")+"$"+(a/1e3).toFixed(0)+"K";return(n<0?"-":"")+"$"+a.toLocaleString();}
function fmtMsigned(n){return(n>=0?"+":"-")+"$"+(Math.abs(n)/1e6).toFixed(2)+"M";}
function fmtPct(n){return(n>=0?"+":"")+n.toFixed(1)+"%";}
function fmtRate(n){return n.toFixed(1)+"%";}

function consumptionRate(row){return(row.consumed/row.committed)*100;}

function enrichRow(row){
  const rate=consumptionRate(row);
  const gap=row.consumed-row.committed;
  return{...row,rate,gap};
}

function getQoQ(data, workload, quarter){
  const byQ={};
  data.filter(r=>r.workload===workload).forEach(r=>{byQ[r.quarter]=r;});
  const qNum=Q_ORDER[quarter];
  if(qNum<=1)return null;
  const prevQ=Object.keys(Q_ORDER).find(k=>Q_ORDER[k]===qNum-1);
  const prev=byQ[prevQ];const cur=byQ[quarter];
  if(!prev||!cur)return null;
  return consumptionRate(cur)-consumptionRate(prev);
}

function getTrendFlags(data){
  const workloads=[...new Set(data.map(r=>r.workload))];
  const accel=new Set(),decline=new Set();
  workloads.forEach(w=>{
    const rows=data.filter(r=>r.workload===w).sort((a,b)=>Q_ORDER[a.quarter]-Q_ORDER[b.quarter]);
    let upStreak=0,downStreak=0;
    rows.forEach((r,i)=>{
      if(i===0)return;
      const prev=rows[i-1];
      const delta=consumptionRate(r)-consumptionRate(prev);
      if(delta>0){upStreak++;downStreak=0;}
      else if(delta<0){downStreak++;upStreak=0;}
      else{upStreak=0;downStreak=0;}
      if(upStreak>=2)accel.add(`${w}|${r.quarter}`);
      if(downStreak>=2)decline.add(`${w}|${r.quarter}`);
    });
  });
  return{accel,decline};
}

function getFastestGrowing(data){
  const workloads=[...new Set(data.map(r=>r.workload))];
  let best=null,bestDelta=-Infinity;
  workloads.forEach(w=>{
    const rows=data.filter(r=>r.workload===w).sort((a,b)=>Q_ORDER[a.quarter]-Q_ORDER[b.quarter]);
    if(rows.length<2)return;
    const delta=consumptionRate(rows[rows.length-1])-consumptionRate(rows[0]);
    if(delta>bestDelta){bestDelta=delta;best=w;}
  });
  return{workload:best,delta:bestDelta};
}

function getAtRisk(data){
  const workloads=[...new Set(data.map(r=>r.workload))];
  let worst=null,worstRate=Infinity;
  workloads.forEach(w=>{
    const rows=data.filter(r=>r.workload===w).sort((a,b)=>Q_ORDER[a.quarter]-Q_ORDER[b.quarter]);
    const latest=rows[rows.length-1];
    const rate=consumptionRate(latest);
    if(rate<worstRate){worstRate=rate;worst=w;}
  });
  return{workload:worst,rate:worstRate};
}

// ── CSV Parser ────────────────────────────────────────────────
function parseCSV(text){
  const lines=text.replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n");
  function tok(line){const sep=line.includes("\t")?"\t":line.includes(";")?";":","
    const t=[];let c="",q=false;for(const ch of line){if(ch==='"'){q=!q;continue;}if(!q&&ch===sep){t.push(c.trim());c="";continue;}c+=ch;}t.push(c.trim());return t;}
  function num(s){if(!s)return NaN;s=String(s).replace(/[$€£¥,\s]/g,"").replace(/[()]/g,"");if(/[Mm]$/.test(s))return parseFloat(s)*1e6;if(/[Kk]$/.test(s))return parseFloat(s)*1e3;return parseFloat(s);}
  function normQ(s){s=String(s).trim().toUpperCase();if(/^Q[1-4]$/.test(s))return s;const m={JAN:"Q1",FEB:"Q1",MAR:"Q1",APR:"Q2",MAY:"Q2",JUN:"Q2",JUL:"Q3",AUG:"Q3",SEP:"Q3",OCT:"Q4",NOV:"Q4",DEC:"Q4"};const key=s.slice(0,3).toUpperCase();return m[key]||s;}
  function scoreH(hs){const h=hs.map(x=>String(x).toLowerCase().replace(/[^a-z]/g,""));const best=(kws)=>{let bi=-1,bs=-1;h.forEach((hh,i)=>{const sc=kws.reduce((s,k)=>s+(hh.includes(k)?k.length:0),0);if(sc>bs){bs=sc;bi=i;}});return bs>0?bi:-1;};
    return{workload:best(["workload","product","service","feature","sku","category"]),quarter:best(["quarter","q","period","time","month","date"]),committed:best(["committed","commit","budget","contract","plan","target"]),consumed:best(["consumed","consume","actual","usage","used","recognized","revenue"])};}
  let hi=-1,cm={workload:-1,quarter:-1,committed:-1,consumed:-1};
  for(let i=0;i<Math.min(lines.length,15);i++){const t=tok(lines[i]);if(t.length<2)continue;const s=scoreH(t);const f=Object.values(s).filter(v=>v>=0).length;if(f>=3&&f>Object.values(cm).filter(v=>v>=0).length){hi=i;cm=s;}}
  const ds=hi>=0?hi+1:0;if(cm.workload<0||cm.committed<0||cm.consumed<0)cm={workload:0,quarter:1,committed:2,consumed:3};
  const rows=[];let lastW="";
  for(let i=ds;i<lines.length;i++){const line=lines[i].trim();if(!line)continue;if(/^(total|subtotal|grand|sum)/i.test(line))continue;
    const cols=tok(line);if(cols.length<2)continue;
    const rw=cm.workload>=0?cols[cm.workload]:"";const w=rw.trim()||lastW;if(w)lastW=w;
    const q=normQ(cm.quarter>=0?cols[cm.quarter]:"");const comm=num(cm.committed>=0?cols[cm.committed]:"");const cons=num(cm.consumed>=0?cols[cm.consumed]:"");
    if(isNaN(comm)||isNaN(cons))continue;rows.push({workload:w||"Unknown",quarter:q||"?",committed:comm,consumed:cons});}
  return rows;
}

// ── Build prompt ──────────────────────────────────────────────
function buildPrompt(data){
  const h="Workload              | Quarter | Committed   | Consumed    | Gap         | Rate";
  const d="-".repeat(85);
  const lines=data.map(r=>{const rate=consumptionRate(r);const gap=r.consumed-r.committed;
    return`${r.workload.padEnd(22)}| ${r.quarter}     | ${fmtM(r.committed).padStart(10)} | ${fmtM(r.consumed).padStart(10)} | ${fmtMsigned(gap).padStart(10)} | ${fmtRate(rate).padStart(6)}`;});
  return`${h}\n${d}\n${lines.join("\n")}`;
}

const SYSTEM_PROMPT=`You are a Senior Director of Product Finance at a consumption-based cloud data platform. You analyze committed vs consumed revenue at the workload level to identify adoption risk, revenue acceleration, and pricing signal. You write like an executive — direct, specific, no padding. Respond only in valid JSON with these exact fields:
{

  "recommended_actions": [array of up to 3 strings — what the finance team should do: re-forecast, flag for CSM, adjust committed tiers, etc.],
  "board_narrative": "3 sentence paragraph written for a board deck. Past tense. Specific workload names and numbers. Frames variance as product signal, not just a miss."
}
Return only valid JSON. No markdown, no preamble.`;

function DataInput({usingDemo,onUseDemo,onCSVUpload}){
  const ref=React.useRef();
  function handleFile(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{const rows=parseCSV(ev.target.result);if(!rows.length){alert("Could not parse. Need columns: Workload, Quarter, Committed, Consumed");return;}onCSVUpload(rows);};r.readAsText(file);e.target.value="";}
  return(
    <div className="flex flex-wrap items-center gap-2">
      <button onClick={onUseDemo} className={`px-4 py-2 rounded-lg text-sm font-semibold transition-all ${usingDemo?"btn-primary":"btn-ghost"}`}>📊 Demo Data</button>

}

function SortIcon({col,sc,sd}){
  if(sc!==col)return<span className="ml-1 opacity-25 text-xs">⇅</span>;
  return<span className="ml-1 text-xs" style={{color:SB}}>{sd==="asc"?"↑":"↓"}</span>;

function rateBadge(rate){
  if(rate>=95)return{bg:"rgba(74,222,128,0.1)",color:"#4ade80",border:"rgba(74,222,128,0.2)"};
  if(rate>=80)return{bg:"rgba(234,179,8,0.08)",color:"#facc15",border:"rgba(234,179,8,0.2)"};
  return{bg:"rgba(239,68,68,0.1)",color:"#f87171",border:"rgba(239,68,68,0.2)"};
}

function VarianceTable({data,signalRows}){
  const [sc,setSc]=React.useState("rate");
  const [sd,setSd]=React.useState("asc");
  function sort(col){if(sc===col)setSd(d=>d==="asc"?"desc":"asc");else{setSc(col);setSd("asc");}}
  const {accel,decline}=React.useMemo(()=>getTrendFlags(data),[data]);

  const enriched=React.useMemo(()=>data.map(r=>{const rate=consumptionRate(r);const gap=r.consumed-r.committed;const qoq=getQoQ(data,r.workload,r.quarter);return{...r,rate,gap,qoq};}),[data]);
  const sorted=React.useMemo(()=>[...enriched].sort((a,b)=>{let av=a[sc],bv=b[sc];if(typeof av==="string"){av=av.toLowerCase();bv=bv.toLowerCase();}return sd==="asc"?(av<bv?-1:av>bv?1:0):(av>bv?-1:av<bv?1:0);}),[enriched,sc,sd]);

  const COLS=[
    {key:"workload",label:"Workload"},
    {key:"quarter",label:"Qtr"},
    {key:"committed",label:"Committed",align:"right"},
    {key:"consumed",label:"Consumed",align:"right"},
    {key:"gap",label:"$ Gap",align:"right"},
    {key:"rate",label:"Consumption Rate",align:"right"},
    {key:"qoq",label:"QoQ Δ",align:"right"},
    {key:"trend",label:"",align:"center",noSort:true},
  ];

  return(
    <div className="rounded-2xl overflow-hidden glass">
      <div className="overflow-x-auto">
        <table className="w-full data-table" style={{borderCollapse:"collapse",fontSize:"12.5px"}}>
          <thead>
            <tr style={{background:"rgba(5,10,20,0.95)",borderBottom:"1px solid rgba(41,181,232,0.1)"}}>
              {COLS.map(c=>(
                <th key={c.key} onClick={()=>!c.noSort&&sort(c.key)}
                  className={`px-4 py-3.5 font-semibold ${c.align==="right"?"text-right":c.align==="center"?"text-center":"text-left"}`}
                  style={{color:"#3d5166",fontSize:"10.5px",letterSpacing:".07em",textTransform:"uppercase"}}>
                  {c.label}{!c.noSort&&<SortIcon col={c.key} sc={sc} sd={sd}/>}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {sorted.map((row,i)=>{
              const key=`${row.workload}|${row.quarter}`;
              const sig=signalRows[key];
              const bc=rateBadge(row.rate);
              const isAccel=accel.has(key),isDecline=decline.has(key);
              const wc=WORKLOAD_COLORS[row.workload]||DEFAULT_COLOR;
              return(
                <tr key={i} className={sig?`signal-${sig}`:""} style={{borderBottom:"1px solid rgba(255,255,255,0.03)",transition:"background .15s"}}>
                  <td className="px-4 py-2.5">
                    <div className="flex items-center gap-2">
                      <div className="w-2 h-2 rounded-full shrink-0" style={{background:wc,boxShadow:`0 0 5px ${wc}66`}}></div>
                      <span className="font-semibold" style={{color:"#cbd5e1"}}>{row.workload}</span>
                    </div>
                  </td>
                  <td className="px-4 py-2.5" style={{color:"#475569",fontWeight:500}}>{row.quarter}</td>
                  <td className="px-4 py-2.5 text-right" style={{color:"#64748b"}}>{fmtM(row.committed)}</td>
                  <td className="px-4 py-2.5 text-right font-semibold" style={{color:"#94a3b8"}}>{fmtM(row.consumed)}</td>
                  <td className="px-4 py-2.5 text-right font-semibold" style={{color:row.gap>=0?"#4ade80":"#f87171"}}>{fmtMsigned(row.gap)}</td>
                  <td className="px-4 py-2.5 text-right">
                    <span className="pill" style={{background:bc.bg,color:bc.color,border:`1px solid ${bc.border}`}}>{fmtRate(row.rate)}</span>
                  </td>
                  <td className="px-4 py-2.5 text-right text-xs font-semibold" style={{color:row.qoq===null?"#334155":row.qoq>0?"#4ade80":"#f87171"}}>{row.qoq===null?"—":fmtPct(row.qoq)}</td>

        </table>
      </div>
    </div>
  );
}

function TrajectoryChart({data}){
  const canvasRef=React.useRef();
  const chartRef=React.useRef();
  const workloads=React.useMemo(()=>[...new Set(data.map(r=>r.workload))],[data]);
  const [visible,setVisible]=React.useState(()=>{const s={};workloads.forEach(w=>s[w]=true);return s;});
  const quarters=["Q1","Q2","Q3","Q4"];

  function toggle(w){setVisible(v=>({...v,[w]:!v[w]}));}

  React.useEffect(()=>{
    if(!canvasRef.current||!window.Chart)return;
    if(chartRef.current)chartRef.current.destroy();
    const datasets=[];
    workloads.forEach(w=>{
      if(!visible[w])return;
      const color=WORKLOAD_COLORS[w]||DEFAULT_COLOR;
      datasets.push({label:`${w} (committed)`,data:quarters.map(q=>{const r=data.find(d=>d.workload===w&&d.quarter===q);return r?r.committed:null;}),borderColor:color,backgroundColor:"transparent",borderDash:[6,4],borderWidth:1.5,pointRadius:0,tension:.4});
      datasets.push({label:`${w} (consumed)`,data:quarters.map(q=>{const r=data.find(d=>d.workload===w&&d.quarter===q);return r?r.consumed:null;}),borderColor:color,backgroundColor:color+"18",borderWidth:2.5,pointRadius:3,pointBackgroundColor:color,tension:.4,fill:false});
    });
    chartRef.current=new window.Chart(canvasRef.current,{
      type:"line",
      data:{labels:quarters,datasets},
      options:{
        responsive:true,maintainAspectRatio:false,
        interaction:{mode:"index",intersect:false},
        plugins:{
          legend:{display:false},
          tooltip:{backgroundColor:"#0d1a2e",borderColor:"rgba(41,181,232,0.2)",borderWidth:1,titleColor:"#64748b",bodyColor:"#e2e8f0",padding:10,callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmtM(ctx.parsed.y)}`}},
        },
        scales:{
          x:{grid:{color:"rgba(255,255,255,0.03)"},ticks:{color:"#475569",font:{size:11}}},
          y:{grid:{color:"rgba(255,255,255,0.03)"},ticks:{color:"#475569",font:{size:11},callback:v=>{if(v>=1e6)return"$"+(v/1e6).toFixed(1)+"M";if(v>=1e3)return"$"+(v/1e3).toFixed(0)+"K";return"$"+v;}},border:{display:false}},
        },
      }
    });
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[data,visible]);

  return(
    <div className="glass glass-hover rounded-2xl p-5">
      <div className="section-label mb-4">Workload Trajectory — Committed vs Consumed</div>
      <div className="flex flex-wrap gap-2 mb-5">
        {workloads.map(w=>(
          <button key={w} onClick={()=>toggle(w)} className="px-3 py-1 rounded-lg text-xs font-semibold flex items-center gap-1.5 transition-all"
            style={{background:visible[w]?`${WORKLOAD_COLORS[w]||DEFAULT_COLOR}18`:"rgba(255,255,255,0.03)",color:visible[w]?WORKLOAD_COLORS[w]||DEFAULT_COLOR:"#475569",border:`1px solid ${visible[w]?(WORKLOAD_COLORS[w]||DEFAULT_COLOR)+"40":"rgba(255,255,255,0.05)"}`,opacity:visible[w]?1:0.45}}>
            <span className="w-2 h-2 rounded-full" style={{background:WORKLOAD_COLORS[w]||DEFAULT_COLOR}}></span>{w}
          </button>
        ))}
      </div>
      <div style={{height:280,position:"relative"}}><canvas ref={canvasRef}></canvas></div>
      <div className="flex items-center gap-4 mt-3 text-xs" style={{color:"#334155"}}>
        <span className="flex items-center gap-1.5"><span style={{display:"inline-block",width:22,height:0,borderTop:"2px dashed #64748b"}}></span>Committed</span>
        <span className="flex items-center gap-1.5"><span style={{display:"inline-block",width:22,height:2,background:"#64748b",borderRadius:2}}></span>Consumed</span>
      </div>
    </div>
  );

function WaterfallChart({data}){
  const canvasRef=React.useRef();
  const chartRef=React.useRef();
  const workloads=[...new Set(data.map(r=>r.workload))];
  const chartData=workloads.map(w=>{
    const rows=data.filter(r=>r.workload===w);
    const gap=rows.reduce((s,r)=>s+(r.consumed-r.committed),0);
    return{label:w.replace("Compute (Warehouses)","Compute").replace("Marketplace / Apps","Marketplace").replace("AI / ML Workloads","AI/ML"),gap};
  }).sort((a,b)=>a.gap-b.gap);

  const fmtGap=(v)=>{if(Math.abs(v)>=1e6)return(v>=0?"+":"-")+"$"+(Math.abs(v)/1e6).toFixed(1)+"M";return(v>=0?"+":"-")+"$"+(Math.abs(v)/1e3).toFixed(0)+"K";};

  React.useEffect(()=>{
    if(!canvasRef.current||!window.Chart)return;
    if(chartRef.current)chartRef.current.destroy();
    chartRef.current=new window.Chart(canvasRef.current,{
      type:"bar",
      data:{
        labels:chartData.map(d=>d.label),
        datasets:[{
          data:chartData.map(d=>d.gap),
          backgroundColor:chartData.map(d=>d.gap>=0?"rgba(41,181,232,0.65)":"rgba(239,68,68,0.55)"),
          borderColor:chartData.map(d=>d.gap>=0?"rgba(41,181,232,0.9)":"rgba(239,68,68,0.8)"),
          borderWidth:1,borderRadius:4,
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{display:false},
          tooltip:{backgroundColor:"#0d1a2e",borderColor:"rgba(41,181,232,0.2)",borderWidth:1,titleColor:"#64748b",bodyColor:"#e2e8f0",padding:10,callbacks:{label:ctx=>`Gap: ${fmtGap(ctx.parsed.y)}`}},
        },
        scales:{
          x:{grid:{display:false},ticks:{color:"#475569",font:{size:11}}},
          y:{grid:{color:"rgba(255,255,255,0.03)"},ticks:{color:"#475569",font:{size:11},callback:fmtGap},border:{display:false}},
        },
      }
    });
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[data]);

  return(
    <div className="glass glass-hover rounded-2xl p-5">
      <div className="section-label">Consumption Gap by Workload — Total Across All Quarters</div>
      <div className="text-xs mb-5" style={{color:"#334155"}}>Blue = over-consumption (revenue upside) · Red = under-consumption (revenue at risk)</div>
      <div style={{height:220,position:"relative"}}><canvas ref={canvasRef}></canvas></div>
    </div>
  );
}

          <KPICard label="Total Committed" value={fmtM(totalCommitted)} sub={`Consumed: ${fmtM(totalConsumed)}`} color="#94a3b8" icon="📋"/>
          <KPICard label="Overall Consumption Rate" value={fmtRate(overallRate)} sub={`Gap: ${fmtMsigned(gap)}`} color={overallRate>=95?"#4ade80":overallRate>=80?"#facc15":"#f87171"} icon="📊"/>
          <KPICard label="Fastest Growing" value={fastest.workload?.split(" ")[0]||"—"} sub={`+${fastest.delta?.toFixed(1)}pp consumption rate`} color="#4ade80" icon="🚀"/>
          <KPICard label="At-Risk Workload" value={atRisk.workload?.split(" ")[0]||"—"} sub={`${fmtRate(atRisk.rate||0)} consumption rate`} color="#f87171" icon="⚠️"/>
        </div>

        {/* Trajectory chart */}
        <div className="fade-up-3"><TrajectoryChart data={data}/></div>

        {/* Table */}
        <div>
          <div className="flex items-center justify-between mb-3">
            <div className="section-label">Variance Detail</div>
            <div className="flex gap-3 text-xs" style={{color:"#334155"}}>
              <span className="flex items-center gap-1"><span className="pill" style={{background:"rgba(74,222,128,0.1)",color:"#4ade80",border:"1px solid rgba(74,222,128,0.2)",fontSize:10}}>&gt;95%</span>healthy</span>
              <span className="flex items-center gap-1"><span className="pill" style={{background:"rgba(234,179,8,0.08)",color:"#facc15",border:"1px solid rgba(234,179,8,0.2)",fontSize:10}}>80–95%</span>watch</span>
              <span className="flex items-center gap-1"><span className="pill" style={{background:"rgba(239,68,68,0.1)",color:"#f87171",border:"1px solid rgba(239,68,68,0.2)",fontSize:10}}>&lt;80%</span>risk</span>
            </div>
          </div>
          <VarianceTable data={data} signalRows={signalRows}/>
        </div>

        {/* Waterfall */}
        <WaterfallChart data={data}/>

        {/* Analysis */}
        <div>
          <div className="section-label">AI Analysis</div>
          <AnalysisPanel data={data} onDone={onDone} result={result} setResult={setResult}/>
        </div>
      </main>

      <footer className="text-center py-5 pb-20 space-y-1">
        <div className="text-xs" style={{color:"#1a2e40"}}>Built with Snowflake Cortex ❄️ and Claude AI</div>
        <div className="text-xs"><a href={AUTHOR_LINKEDIN} target="_blank" rel="noreferrer" className="font-semibold hover:opacity-80 transition-opacity" style={{color:SB}}>Nithya Kuppa</a></div>
      </footer>

      <StickyBar data={data} boardNarrative={boardNarrative}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
