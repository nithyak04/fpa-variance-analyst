];

const REVENUE_DEPTS = new Set(["Sales"]);
const MONTH_ORDER = { Jan:1, Feb:2, Mar:3, Apr:4, May:5, Jun:6, Jul:7, Aug:8, Sep:9, Oct:10, Nov:11, Dec:12 };

function calcVariance(row) {
  const dollar = row.actual - row.budget;
  const pct = (dollar / row.budget) * 100;
  const isRevenue = REVENUE_DEPTS.has(row.department);
  const badness = isRevenue ? -pct : pct;
  return { dollar, pct, badness };
}

function enrichData(rows) {
  return rows.map(r => { const v = calcVariance(r); return { ...r, ...v }; });
}

function getTrendFlags(enriched) {
  const byDept = {};
  enriched.forEach(r => { if (!byDept[r.department]) byDept[r.department] = []; byDept[r.department].push(r); });
  const flagged = new Set();
  Object.values(byDept).forEach(rows => {
    const sorted = [...rows].sort((a,b) => (MONTH_ORDER[a.month]||99)-(MONTH_ORDER[b.month]||99));
    let streak = 0;
    sorted.forEach((r, i) => {
      if (r.badness > 5) {
        streak++;
        if (streak >= 2) { flagged.add(`${r.department}|${r.month}`); flagged.add(`${sorted[i-1].department}|${sorted[i-1].month}`); }
      } else { streak = 0; }
    });
  });
  return flagged;
}

function varianceCellClass(badness) {
  if (badness > 5) return "bg-red-900/60 text-red-300 font-semibold";
  if (badness > 2) return "bg-yellow-900/50 text-yellow-300 font-semibold";
  return "bg-green-900/40 text-green-300";
}

function fmt$(n) {
  const abs = Math.abs(n), sign = n < 0 ? "-" : "+";
  if (abs >= 1000000) return sign+"$"+(abs/1000000).toFixed(2)+"M";
  if (abs >= 1000) return sign+"$"+(abs/1000).toFixed(1)+"K";
  return sign+"$"+abs.toLocaleString();
}
function fmtPct(n) { return (n>=0?"+":"")+n.toFixed(1)+"%"; }
function fmtBig(n) { return "$"+Math.abs(n).toLocaleString(); }

// ── Smart CSV Parser ────────────────────────────────────────
// Handles: any column order, missing headers, merged dept cells,
// messy number formats ($1.2M, 1,000,000), full/partial month names,
// date strings (Jan-24, 01/2024, Q1), extra junk rows, tabs/semicolons
function parseCSV(text) {
  // Normalize line endings and split
  const rawLines = text.replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n");

  // Tokenize a line — handles quoted fields, tabs, semicolons, commas
  function tokenize(line) {
    const sep = line.includes("\t") ? "\t" : line.includes(";") ? ";" : ",";
    const tokens = []; let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; continue; }
      if (!inQ && c === sep) { tokens.push(cur.trim()); cur = ""; continue; }
      cur += c;
    }
    tokens.push(cur.trim());
    return tokens;
  }

  // Parse a number from messy strings: $1.2M, (500), 1,000,000, 1.5k
  function parseNum(s) {
    if (!s) return NaN;
    s = String(s).trim().replace(/[$€£¥\s]/g,"");
    const neg = s.startsWith("(") && s.endsWith(")");
    s = s.replace(/[()]/g,"");
    let mul = 1;
    if (/[Mm]$/.test(s)) { mul = 1000000; s = s.replace(/[Mm]$/,""); }
    else if (/[Kk]$/.test(s)) { mul = 1000; s = s.replace(/[Kk]$/,""); }
    s = s.replace(/,/g,"");
    const n = parseFloat(s) * mul;
    return isNaN(n) ? NaN : (neg ? -n : n);
  }

  // Normalize month — accepts Jan, January, 1, 01, Jan-24, 01/2024, Q1 etc.
  const MONTH_NAMES = ["jan","feb","mar","apr","may","jun","jul","aug","sep","oct","nov","dec"];
  const MONTH_LABELS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const Q_MAP = { q1:"Mar", q2:"Jun", q3:"Sep", q4:"Dec" };
  function normalizeMonth(s) {
    if (!s) return null;
    s = String(s).trim().toLowerCase().replace(/[^a-z0-9]/g,"");
    // Quarter
    if (/^q[1-4]$/.test(s)) return Q_MAP[s];
    // Full or partial month name
    for (let i = 0; i < MONTH_NAMES.length; i++) {
      if (s.startsWith(MONTH_NAMES[i])) return MONTH_LABELS[i];
    }
    // Numeric month 1-12
    const n = parseInt(s);
    if (!isNaN(n) && n >= 1 && n <= 12) return MONTH_LABELS[n-1];
    return null;
  }

  // Score how likely a cell value is a column type
  function scoreCols(headers) {
    const h = headers.map(h => String(h).toLowerCase().replace(/[^a-z]/g,""));
    function best(keywords) {
      let bestIdx = -1, bestScore = -1;
      h.forEach((hh, i) => {
        const score = keywords.reduce((s, kw) => s + (hh.includes(kw) ? kw.length : 0), 0);
        if (score > bestScore) { bestScore = score; bestIdx = i; }
      });
      return bestScore > 0 ? bestIdx : -1;
    }
    return {
      dept:   best(["department","dept","team","division","group","cost","center","bu","business"]),
      month:  best(["month","period","mo","date","time","week","quarter"]),
      budget: best(["budget","plan","target","forecast","bud","planned"]),
      actual: best(["actual","actuals","real","result","spent","act","ytd","amount"]),
    };
  }

  // Find the best header row (the one whose columns score highest)
  let headerIdx = -1, colMap = { dept:-1, month:-1, budget:-1, actual:-1 };
  for (let i = 0; i < Math.min(rawLines.length, 20); i++) {
    const tokens = tokenize(rawLines[i]);
    if (tokens.length < 2) continue;
    const scores = scoreCols(tokens);
    const found = Object.values(scores).filter(v => v >= 0).length;
    if (found >= 3 && found > Object.values(colMap).filter(v=>v>=0).length) {
      headerIdx = i; colMap = scores;
    }
  }

  // If no header found, try to infer from first data row positions
  const dataStart = headerIdx >= 0 ? headerIdx + 1 : 0;

  // If columns still not identified, do positional fallback (dept, month, budget, actual)
  if (colMap.dept < 0 || colMap.budget < 0 || colMap.actual < 0) {
    colMap = { dept: 0, month: 1, budget: 2, actual: 3 };
  }

  const rows = [];
  let lastDept = "";

  for (let i = dataStart; i < rawLines.length; i++) {
    const line = rawLines[i].trim();
    if (!line) continue;
    const cols = tokenize(line);
    if (cols.length < 2) continue;

    // Skip obvious junk rows (totals, subtotals, notes)
    const lineL = line.toLowerCase();
    if (/^\s*(total|subtotal|grand|sum|average|note|source|#)/i.test(lineL)) continue;

    const rawDept   = colMap.dept   >= 0 ? cols[colMap.dept]   : "";
    const rawMonth  = colMap.month  >= 0 ? cols[colMap.month]  : "";
    const rawBudget = colMap.budget >= 0 ? cols[colMap.budget] : "";
    const rawActual = colMap.actual >= 0 ? cols[colMap.actual] : "";

    // Support merged dept cells (blank dept = same as last row)
    const dept = rawDept.trim() || lastDept;
    if (dept) lastDept = dept;

    const month = normalizeMonth(rawMonth);
    const budget = parseNum(rawBudget);
    const actual = parseNum(rawActual);

    // Must have valid numbers and either a dept or a month
    if (isNaN(budget) || isNaN(actual)) continue;
    if (!dept && !month) continue;

    rows.push({
      department: dept || "Unknown",
      month: month || rawMonth || "?",
      budget,
      actual,
    });
  }

  return rows;
}

function buildPrompt(enriched) {
  const header = "Department         | Month | Budget      | Actual      | $ Variance  | % Variance";
  const div = "-".repeat(80);
  const lines = enriched.map(r =>
    `${r.department.padEnd(18)} | ${r.month} | ${fmtBig(r.budget).padStart(10)} | ${fmtBig(r.actual).padStart(10)} | ${fmt$(r.dollar).padStart(10)} | ${fmtPct(r.pct).padStart(8)}`
  );
  return `${header}\n${div}\n${lines.join("\n")}`;
}

// ── Components ──────────────────────────────────────────────

function Header() {
  return (
    <header className="w-full px-8 py-4 flex items-center justify-between border-b border-slate-700/60" style={{background:"#0d1520"}}>
      <div className="flex items-center gap-3">
        <span className="text-2xl">❄️</span>
        <div>
          <div className="text-xl font-bold tracking-tight text-white">Cortex FP&amp;A</div>
          <div className="text-xs font-medium" style={{color:SNOWFLAKE_BLUE}}>Variance Intelligence — Powered by Snowflake Cortex</div>
        </div>
      </div>
      <div className="text-xs text-slate-500 hidden sm:block">FY Budget vs. Actual Analysis</div>
    </header>
  );
}

function DataInput({ usingDemo, onUseDemo, onCSVUpload }) {
  const fileRef = React.useRef();
  function handleFile(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const rows = parseCSV(ev.target.result);
      if (rows.length === 0) { alert("Could not parse CSV. Ensure columns: Department, Month, Budget, Actual"); return; }
      onCSVUpload(rows);
    };
    reader.readAsText(file); e.target.value = "";
  }
  return (
    <div className="flex items-center gap-3">
      <button onClick={onUseDemo} className="px-4 py-2 rounded text-sm font-medium transition-all"
        style={usingDemo ? {background:SNOWFLAKE_BLUE,color:"#0d1117"} : {background:"#1c2a3a",color:"#94a3b8",border:"1px solid #334155"}}>
        📊 Use Demo Data
      </button>
      <button onClick={()=>fileRef.current.click()} className="px-4 py-2 rounded text-sm font-medium transition-all"
        style={!usingDemo ? {background:SNOWFLAKE_BLUE,color:"#0d1117"} : {background:"#1c2a3a",color:"#94a3b8",border:"1px solid #334155"}}>
        📁 Upload CSV
      </button>
      <input ref={fileRef} type="file" accept=".csv,text/csv" className="hidden" onChange={handleFile}/>
      <span className="text-xs text-slate-500">CSV: Department, Month, Budget, Actual</span>
    </div>
  );
}

function SortIcon({col,sortCol,sortDir}) {
  if (sortCol !== col) return <span className="ml-1 text-slate-600">⇅</span>;
  return <span className="ml-1" style={{color:SNOWFLAKE_BLUE}}>{sortDir==="asc"?"↑":"↓"}</span>;
}

function VarianceTable({ data, analysisRows }) {
  const [sortCol, setSortCol] = React.useState("badness");
  const [sortDir, setSortDir] = React.useState("desc");
  const enriched = React.useMemo(()=>enrichData(data),[data]);
  const trendFlags = React.useMemo(()=>getTrendFlags(enriched),[enriched]);

  function handleSort(col) {
    if (sortCol===col) setSortDir(d=>d==="asc"?"desc":"asc");
    else { setSortCol(col); setSortDir("desc"); }
  }

  const sorted = React.useMemo(()=>[...enriched].sort((a,b)=>{
    let av=a[sortCol],bv=b[sortCol];
    if (typeof av==="string") { av=av.toLowerCase(); bv=bv.toLowerCase(); }
    if (av<bv) return sortDir==="asc"?-1:1;
    if (av>bv) return sortDir==="asc"?1:-1;
    return 0;
  }),[enriched,sortCol,sortDir]);

  const COLS = [
    {key:"department",label:"Department"},
    {key:"month",label:"Month"},
    {key:"budget",label:"Budget",align:"right"},
    {key:"actual",label:"Actual",align:"right"},
    {key:"dollar",label:"$ Variance",align:"right"},
    {key:"pct",label:"% Variance",align:"right"},
    {key:"trend",label:"Trend",align:"center",noSort:true},
  ];

  return (
    <div className="table-container rounded-lg border border-slate-700/50" style={{background:"#111827"}}>
      <table className="w-full text-sm border-collapse">
        <thead>
          <tr style={{background:"#0d1520",borderBottom:"1px solid #1e3a5f"}}>
            {COLS.map(c=>(
              <th key={c.key}
                className={`px-4 py-3 text-xs font-semibold uppercase tracking-wider ${c.align==="right"?"text-right":c.align==="center"?"text-center":"text-left"}`}
                style={{color:"#64748b"}} onClick={()=>!c.noSort&&handleSort(c.key)}>
                {c.label}{!c.noSort&&<SortIcon col={c.key} sortCol={sortCol} sortDir={sortDir}/>}
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {sorted.map((row,i)=>{
            const key=`${row.department}|${row.month}`;
            const isTrend=trendFlags.has(key), isAI=analysisRows.has(key);
            return (
              <tr key={i} className={`border-b border-slate-800/60 transition-colors ${isAI?"flagged-row":""}`}
                style={{background:isAI?"rgba(41,181,232,0.06)":i%2===0?"#111827":"#0f1923",outline:isAI?"1px solid rgba(41,181,232,0.25)":"none"}}>
                <td className="px-4 py-2.5 text-slate-200 font-medium">{row.department}</td>
                <td className="px-4 py-2.5 text-slate-400">{row.month}</td>
                <td className="px-4 py-2.5 text-right text-slate-300">{fmtBig(row.budget)}</td>
                <td className="px-4 py-2.5 text-right text-slate-300">{fmtBig(row.actual)}</td>
                <td className={`px-4 py-2.5 text-right ${row.dollar<0?"text-red-400":"text-green-400"}`}>{fmt$(row.dollar)}</td>
                <td className="px-4 py-2.5 text-right">
                  <span className={`inline-block px-2 py-0.5 rounded text-xs ${varianceCellClass(row.badness)}`}>{fmtPct(row.pct)}</span>
                </td>
                <td className="px-4 py-2.5 text-center text-base">{isTrend?"🔴":""}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

function Card({title,icon,children,accent}) {
  return (
    <div className="rounded-lg p-4 border" style={{background:"#111827",borderColor:accent||"#1e3a5f"}}>
      <div className="flex items-center gap-2 mb-3">
        <span className="text-base">{icon}</span>
        <span className="text-sm font-semibold text-slate-200 uppercase tracking-wide">{title}</span>
      </div>
      {children}
    </div>
  );
}

function AnalysisPanel({ data, onAnalysisDone, analysisResult, setAnalysisResult }) {
  const [status, setStatus] = React.useState("idle");
  const [errorMsg, setErrorMsg] = React.useState("");
  const [copied, setCopied] = React.useState(false);

  async function runAnalysis() {
    setStatus("loading"); setErrorMsg(""); setAnalysisResult(null);
    const enriched = enrichData(data);
    try {
      const res = await fetch("/api/analyze", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          model: "gpt-4o",
          max_tokens: 3000,
          messages: [
            { role: "system", content: SYSTEM_PROMPT },
            { role: "user", content: buildPrompt(enriched) },
          ],
        }),
      });
      if (!res.ok) { const err = await res.text(); throw new Error(`API ${res.status}: ${err}`); }
      const json = await res.json();
      const raw = json.choices?.[0]?.message?.content || "";
      const text = raw.replace(/^```(?:json)?\s*/i, "").replace(/```\s*$/,"").trim();
      try {
        const parsed = JSON.parse(text);
        setAnalysisResult(parsed); onAnalysisDone(parsed); setStatus("done");
      } catch {
        setAnalysisResult({ _raw: text }); onAnalysisDone({}); setStatus("done");
      }
    } catch(e) { setErrorMsg(e.message); setStatus("error"); }
  }

  function copyNarrative() {
    navigator.clipboard.writeText(analysisResult?.cfo_narrative||"").then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});
  }

  return (
    <div className="rounded-xl border border-slate-700/50 p-6" style={{background:"#0d1520"}}>
      <div className="flex items-center justify-between mb-5">
        <div>
          <h2 className="text-base font-semibold text-white">❄️ Cortex AI Analysis</h2>
          <p className="text-xs text-slate-500 mt-0.5">Powered by Snowflake Cortex + Claude AI</p>
        </div>
        {status !== "loading" && (
          <button onClick={runAnalysis} className="px-5 py-2.5 rounded-lg text-sm font-semibold transition-all hover:opacity-90 active:scale-95"
            style={{background:SNOWFLAKE_BLUE,color:"#0d1117"}}>
            {status==="done"?"↺ Re-run Analysis":"▶ Run Cortex Analysis"}
          </button>
        )}
      </div>

      {status==="idle" && (
        <div className="text-center py-8 text-slate-600 text-sm border border-dashed border-slate-700/40 rounded-lg">
          Click "Run Cortex Analysis" to generate AI-powered variance insights
        </div>
      )}

      {status==="loading" && (
        <div className="text-center py-10">
          <div className="text-2xl mb-3 animate-spin inline-block">❄️</div>
          <div className="text-sm font-medium" style={{color:SNOWFLAKE_BLUE}}>Cortex is analyzing your variance data…</div>
          <div className="text-xs text-slate-600 mt-2">Querying Snowflake Cortex inference layer</div>
        </div>
      )}

      {status==="error" && (
        <div className="rounded-lg p-4 border border-red-800/50 bg-red-950/30">
          <div className="text-sm font-semibold text-red-400 mb-1">⚠ Analysis Failed</div>
          <div className="text-xs text-red-300/70 mb-3 break-all">{errorMsg}</div>
          <button onClick={runAnalysis} className="px-4 py-1.5 rounded text-xs font-semibold"
            style={{background:"#7f1d1d",color:"#fca5a5",border:"1px solid #991b1b"}}>Retry</button>
        </div>
      )}

      {status==="done" && analysisResult && (
        <>
          {analysisResult._raw ? (
            <div className="rounded-lg p-4 border border-slate-700/50 bg-slate-900">
              <div className="text-xs text-yellow-400 mb-2">⚠ Response was not valid JSON — showing raw output</div>
              <pre className="text-xs text-slate-300 whitespace-pre-wrap">{analysisResult._raw}</pre>
            </div>
          ) : (
            <div className="space-y-4">

              {/* Health Summary Bar */}
              {analysisResult.summary && (() => {
                const s = analysisResult.summary;
                const healthColor = s.overall_health==="on-track" ? "#4ade80" : s.overall_health==="at-risk" ? "#facc15" : "#f87171";
                const healthBg = s.overall_health==="on-track" ? "#14532d" : s.overall_health==="at-risk" ? "#713f12" : "#7f1d1d";
                return (
                  <div className="rounded-lg p-4 border border-slate-700/40 flex flex-wrap gap-6 items-center" style={{background:"#111827"}}>
                    <div>
                      <div className="text-xs text-slate-500 mb-1">Overall Health</div>
                      <span className="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wide" style={{background:healthBg,color:healthColor}}>
                        {s.overall_health}
                      </span>
                    </div>
                    <div><div className="text-xs text-slate-500 mb-1">Net Variance</div>
                      <div className="text-sm font-bold" style={{color: s.net_variance_dollar>=0?"#4ade80":"#f87171"}}>
                        {s.net_variance_dollar>=0?"+":""}{s.net_variance_dollar?.toLocaleString ? "$"+Math.abs(s.net_variance_dollar).toLocaleString() : s.net_variance_dollar} ({s.net_variance_pct>=0?"+":""}{typeof s.net_variance_pct==="number"?s.net_variance_pct.toFixed(1):s.net_variance_pct}%)
                      </div>
                    </div>
                    <div><div className="text-xs text-slate-500 mb-1">Worst Dept</div><div className="text-sm font-semibold text-red-400">{s.worst_department}</div></div>
                    <div><div className="text-xs text-slate-500 mb-1">Best Dept</div><div className="text-sm font-semibold text-green-400">{s.best_department}</div></div>
                  </div>
                );
              })()}

              {/* Anomalies */}
              <Card title="Anomalies Detected" icon="🔍" accent="#1e3a5f">
                <div className="space-y-3">
                  {(analysisResult.anomalies||[]).map((a,i)=>{
                    const sevColor = a.severity==="high" ? "#f87171" : a.severity==="medium" ? "#facc15" : "#94a3b8";
                    const sevBg    = a.severity==="high" ? "#7f1d1d" : a.severity==="medium" ? "#713f12" : "#1e293b";
                    return (
                      <div key={i} className="rounded-lg p-3" style={{background:"#0d1520",border:"1px solid #1e3a5f"}}>
                        <div className="flex items-center gap-2 mb-1.5">
                          <span className="text-xs font-bold text-slate-100">{a.title||a}</span>
                          {a.severity && <span className="px-1.5 py-0.5 rounded text-xs font-semibold uppercase" style={{background:sevBg,color:sevColor}}>{a.severity}</span>}
                          {a.department && <span className="text-xs text-slate-500">{a.department} · {a.month}</span>}
                        </div>
                        {a.detail && <p className="text-xs text-slate-400 leading-relaxed">{a.detail}</p>}
                      </div>
                    );
                  })}
                </div>
              </Card>

              {/* Root Causes */}
              <Card title="Root Cause Analysis" icon="🧠" accent="#1e3a5f">
                <div className="space-y-3">
                  {(analysisResult.root_causes||[]).map((rc,i)=>{
                    const confColor = rc.confidence==="high"?"#4ade80":rc.confidence==="medium"?"#facc15":"#94a3b8";
                    return (
                      <div key={i} className="rounded-lg p-3" style={{background:"#0d1520",border:"1px solid #1e3a5f"}}>
                        <div className="flex flex-wrap items-center gap-2 mb-2">
                          <span className="text-xs font-bold" style={{color:SNOWFLAKE_BLUE}}>{rc.department}</span>
                          <span className="text-xs text-slate-500">·</span>
                          <span className="text-xs text-slate-400">{rc.month}</span>
                          {rc.variance_dollar !== undefined && (
                            <span className={`text-xs font-semibold ${rc.variance_dollar<0?"text-red-400":"text-green-400"}`}>
                              {rc.variance_dollar>=0?"+":""}{typeof rc.variance_dollar==="number"?"$"+Math.abs(rc.variance_dollar).toLocaleString():rc.variance_dollar}
                              {rc.variance_pct !== undefined && ` (${rc.variance_pct>=0?"+":""}${typeof rc.variance_pct==="number"?rc.variance_pct.toFixed(1):rc.variance_pct}%)`}
                            </span>
                          )}
                          {rc.confidence && <span className="ml-auto text-xs" style={{color:confColor}}>● {rc.confidence} confidence</span>}
                        </div>
                        <p className="text-xs text-slate-300 mb-2">{rc.hypothesis}</p>
                        {(rc.contributing_factors||[]).length > 0 && (
                          <div className="flex flex-wrap gap-1.5">
                            {rc.contributing_factors.map((f,j)=>(
                              <span key={j} className="px-2 py-0.5 rounded text-xs text-slate-400" style={{background:"#1e3a5f"}}>{f}</span>
                            ))}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </Card>

              {/* Department Insights */}
              {(analysisResult.department_insights||[]).length > 0 && (
                <Card title="Department Insights" icon="📈" accent="#1e3a5f">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                    {(analysisResult.department_insights||[]).map((d,i)=>{
                      const trendIcon = d.trend==="improving"?"↗":"deteriorating"?"↘":d.trend==="volatile"?"↕":"→";
                      const trendColor = d.trend==="improving"?"#4ade80":d.trend==="deteriorating"?"#f87171":d.trend==="volatile"?"#facc15":"#94a3b8";
                      return (
                        <div key={i} className="rounded-lg p-3" style={{background:"#0d1520",border:"1px solid #1e3a5f"}}>
                          <div className="flex items-center justify-between mb-1.5">
                            <span className="text-xs font-bold text-slate-100">{d.department}</span>
                            <span className="text-xs font-semibold" style={{color:trendColor}}>{trendIcon} {d.trend}</span>
                          </div>
                          <p className="text-xs text-slate-400 leading-relaxed mb-2">{d.insight}</p>
                          {d.action && <div className="text-xs rounded p-1.5" style={{background:"#0a1a2a",color:SNOWFLAKE_BLUE}}>→ {d.action}</div>}
                        </div>
                      );
                    })}
                  </div>
                </Card>
              )}

              {/* Risk Flags */}
              <Card title="Risk Flags" icon="🚩" accent="#3b1f1f">
                <div className="space-y-3">
                  {(analysisResult.risk_flags||[]).map((r,i)=>{
                    const urgColor = r.urgency==="immediate"?"#f87171":r.urgency==="watch"?"#facc15":"#94a3b8";
                    const urgBg    = r.urgency==="immediate"?"#7f1d1d":r.urgency==="watch"?"#713f12":"#1e293b";
                    return (
                      <div key={i} className="rounded-lg p-3" style={{background:"#1a0a0a",border:"1px solid #3b1f1f"}}>
                        <div className="flex items-start gap-2">
                          <span className="text-red-400 shrink-0 mt-0.5">▸</span>
                          <div className="flex-1">
                            <div className="flex items-center gap-2 mb-1">
                              <span className="text-xs text-slate-200">{r.flag||r}</span>
                              {r.urgency && <span className="px-1.5 py-0.5 rounded text-xs font-semibold uppercase shrink-0" style={{background:urgBg,color:urgColor}}>{r.urgency}</span>}
                            </div>
                            {r.impact && <p className="text-xs text-slate-500">{r.impact}</p>}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </Card>

              {/* Recommendations */}
              {(analysisResult.recommendations||[]).length > 0 && (
                <Card title="Recommended Actions" icon="✅" accent="#1a2e1a">
                  <div className="space-y-3">
                    {(analysisResult.recommendations||[]).map((rec,i)=>(
                      <div key={i} className="rounded-lg p-3 flex gap-3" style={{background:"#0a1a0a",border:"1px solid #1a3a1a"}}>
                        <div className="w-6 h-6 rounded-full flex items-center justify-center shrink-0 text-xs font-bold" style={{background:"#14532d",color:"#4ade80"}}>
                          {rec.priority||i+1}
                        </div>
                        <div className="flex-1">
                          <div className="text-xs font-semibold text-slate-100 mb-1">{rec.action}</div>
                          <div className="flex flex-wrap gap-3 text-xs text-slate-500">
                            {rec.owner && <span>👤 {rec.owner}</span>}
                            {rec.expected_impact && <span>🎯 {rec.expected_impact}</span>}
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </Card>
              )}

              {/* CFO Narrative */}
              <Card title="CFO Narrative" icon="📋" accent="#1a2e1a">
                <div className="rounded-lg p-4 mb-3 text-sm leading-relaxed text-slate-200" style={{background:"#0a1a0a",border:"1px solid #1a3a1a"}}>
                  {analysisResult.cfo_narrative}
                </div>
                <button onClick={copyNarrative} className="w-full py-1.5 rounded text-xs font-semibold transition-all"
                  style={{background:copied?"#14532d":"#1c3a1c",color:copied?"#86efac":"#4ade80",border:`1px solid ${copied?"#166534":"#1a3a1a"}`}}>
                  {copied?"✓ Copied!":"Copy to Clipboard"}
                </button>
              </Card>

            </div>
          )}
        </>
      )}
    </div>
  );
}

function StickyBar({ enrichedData, cfoNarrative }) {
  const [copiedNarr,setCopiedNarr]=React.useState(false);
  const [copiedCSV,setCopiedCSV]=React.useState(false);

  function copyNarrative() {
    if (!cfoNarrative) return;
    navigator.clipboard.writeText(cfoNarrative).then(()=>{setCopiedNarr(true);setTimeout(()=>setCopiedNarr(false),2000);});
  }
  function downloadCSV() {
    const header="Department,Month,Budget,Actual,$ Variance,% Variance\n";
    const rows=enrichedData.map(r=>`${r.department},${r.month},${r.budget},${r.actual},${r.dollar},${r.pct.toFixed(2)}%`).join("\n");
    const blob=new Blob([header+rows],{type:"text/csv"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=`fpa_variance_${new Date().toISOString().slice(0,10)}.csv`;
    a.click(); URL.revokeObjectURL(url);
    setCopiedCSV(true); setTimeout(()=>setCopiedCSV(false),2000);
  }
  function exportSummary() {
    const date=new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
    const tableRows=enrichedData.map(r=>`<tr><td>${r.department}</td><td>${r.month}</td><td>$${r.budget.toLocaleString()}</td><td>$${r.actual.toLocaleString()}</td><td style="color:${r.dollar<0?"#dc2626":"#16a34a"}">${fmt$(r.dollar)}</td><td>${fmtPct(r.pct)}</td></tr>`).join("");
    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>FP&A Executive Summary</title>
<style>body{font-family:Arial,sans-serif;max-width:900px;margin:40px auto;color:#1e293b;padding:0 24px}h1{font-size:22px;font-weight:700;color:#0f172a;margin-bottom:4px}.sub{font-size:13px;color:#64748b;margin-bottom:32px}table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:32px}th{background:#0d1520;color:#fff;padding:8px 12px;text-align:left;font-weight:600}td{padding:7px 12px;border-bottom:1px solid #e2e8f0}tr:nth-child(even) td{background:#f8fafc}.narrative{background:#f0fdf4;border-left:4px solid #16a34a;padding:16px 20px;border-radius:4px;font-size:14px;line-height:1.7}.footer{margin-top:48px;font-size:11px;color:#94a3b8;text-align:center}</style></head>
<body><h1>❄️ Cortex FP&amp;A — Variance Executive Summary</h1><div class="sub">Generated ${date} · Powered by Snowflake Cortex</div>
<table><thead><tr><th>Department</th><th>Month</th><th>Budget</th><th>Actual</th><th>$ Variance</th><th>% Variance</th></tr></thead><tbody>${tableRows}</tbody></table>
${cfoNarrative?`<div class="narrative"><strong>CFO Narrative</strong><br/><br/>${cfoNarrative}</div>`:""}
<div class="footer">Built with Snowflake Cortex ❄️ and Claude AI · ${AUTHOR_HANDLE}</div></body></html>`;
    const blob=new Blob([html],{type:"text/html"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=`fpa_executive_summary_${new Date().toISOString().slice(0,10)}.html`;
    a.click(); URL.revokeObjectURL(url);
  }

  const btn="px-4 py-2 rounded text-xs font-semibold transition-all hover:opacity-90 active:scale-95";
  return (
    <div className="sticky-bar px-6 py-3 flex items-center gap-3 border-t border-slate-700/50" style={{background:"#0a0f18"}}>
      <span className="text-xs text-slate-500 mr-2 hidden sm:block">Export:</span>
      <button onClick={copyNarrative} disabled={!cfoNarrative} className={btn}
        style={{background:copiedNarr?"#14532d":"#1c2a3a",color:copiedNarr?"#86efac":"#94a3b8",border:"1px solid #334155",opacity:cfoNarrative?1:0.4}}>
        {copiedNarr?"✓ Copied!":"📋 Copy CFO Narrative"}
      </button>
      <button onClick={downloadCSV} className={btn}
        style={{background:copiedCSV?"#14532d":"#1c2a3a",color:copiedCSV?"#86efac":"#94a3b8",border:"1px solid #334155"}}>
        {copiedCSV?"✓ Downloaded!":"⬇ Download CSV"}
      </button>
      <button onClick={exportSummary} className={btn}
        style={{background:"#1c2a3a",color:"#94a3b8",border:"1px solid #334155"}}>
        📄 Export Summary
      </button>
      <div className="ml-auto text-xs text-slate-600 hidden md:block">❄️ Snowflake Cortex FP&amp;A</div>
    </div>
  );
}

// ── Root App ─────────────────────────────────────────────────
function App() {
  const [data,setData]=React.useState(DEMO_DATA);
  const [usingDemo,setUsingDemo]=React.useState(true);
  const [analysisResult,setAnalysisResult]=React.useState(null);
  const [analysisRows,setAnalysisRows]=React.useState(new Set());

  function useDemo(){setData(DEMO_DATA);setUsingDemo(true);setAnalysisResult(null);setAnalysisRows(new Set());}
  function uploadCSV(rows){setData(rows);setUsingDemo(false);setAnalysisResult(null);setAnalysisRows(new Set());}

  function onAnalysisDone(result) {
    const rows=new Set();
    (result.anomalies||[]).forEach(a=>{
      data.forEach(r=>{ if(a.toLowerCase().includes(r.department.toLowerCase())&&a.toLowerCase().includes(r.month.toLowerCase())) rows.add(`${r.department}|${r.month}`); });
    });
    (result.root_causes||[]).forEach(rc=>rows.add(`${rc.department}|${rc.month}`));
    setAnalysisRows(rows);
  }

  const enriched=React.useMemo(()=>enrichData(data),[data]);
  const cfoNarrative=analysisResult?.cfo_narrative||"";

  const totalBudget=enriched.reduce((s,r)=>s+r.budget,0);
  const totalActual=enriched.reduce((s,r)=>s+r.actual,0);
  const totalDelta=totalActual-totalBudget;
  const redCount=enriched.filter(r=>r.badness>5).length;

  const stats=[
    {label:"Total Budget",   value:"$"+(totalBudget/1000000).toFixed(2)+"M", color:"#64748b"},
    {label:"Total Actual",   value:"$"+(totalActual/1000000).toFixed(2)+"M", color:SNOWFLAKE_BLUE},
    {label:"Net Variance",   value:fmt$(totalDelta), color:totalDelta>=0?"#4ade80":"#f87171"},
    {label:"Red Variances",  value:redCount+" rows",  color:"#f87171"},
  ];

  return (
    <div className="min-h-screen pb-20" style={{background:"#0d1117",color:"#e2e8f0"}}>
      <Header/>
      <main className="max-w-7xl mx-auto px-4 sm:px-6 py-6 space-y-6">

        {/* Data source */}
        <div className="flex flex-wrap items-center justify-between gap-4 p-4 rounded-lg border border-slate-700/40" style={{background:"#0d1520"}}>
          <div>
            <div className="text-sm font-semibold text-slate-200 mb-0.5">Data Source</div>
            <div className="text-xs text-slate-500">Switch between demo data or upload your own CSV</div>
          </div>
          <DataInput usingDemo={usingDemo} onUseDemo={useDemo} onCSVUpload={uploadCSV}/>
        </div>

        {/* Stats */}
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
          {stats.map((s,i)=>(
            <div key={i} className="rounded-lg p-4 border border-slate-700/40" style={{background:"#111827"}}>
              <div className="text-xs text-slate-500 mb-1">{s.label}</div>
              <div className="text-xl font-bold" style={{color:s.color}}>{s.value}</div>
            </div>
          ))}
        </div>

        {/* Table */}
        <div>
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-semibold text-slate-300">📊 Budget vs. Actual — All Departments</h2>
            <div className="flex gap-3 text-xs text-slate-500">
              <span><span className="inline-block w-2 h-2 rounded-sm bg-red-900 mr-1"></span>&gt; -5% bad</span>
              <span><span className="inline-block w-2 h-2 rounded-sm bg-yellow-900 mr-1"></span>-2 to -5%</span>
              <span><span className="inline-block w-2 h-2 rounded-sm bg-green-900 mr-1"></span>within 2%</span>
            </div>
          </div>
          <VarianceTable data={data} analysisRows={analysisRows}/>
        </div>

        {/* Analysis */}
        <AnalysisPanel data={data} onAnalysisDone={onAnalysisDone} analysisResult={analysisResult} setAnalysisResult={setAnalysisResult}/>

      </main>
      <footer className="text-center text-xs text-slate-600 py-4 pb-20">
        Built with Snowflake Cortex ❄️ and Claude AI — {AUTHOR_HANDLE}
      </footer>
      <StickyBar enrichedData={enriched} cfoNarrative={cfoNarrative}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
