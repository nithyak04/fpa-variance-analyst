const REVENUE_DEPTS = new Set(["Sales"]);
const MONTH_ORDER = {Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};

// ── Math helpers ──────────────────────────────────────────────
function calcVariance(row) {
  const dollar = row.actual - row.budget;
  const pct = (dollar / row.budget) * 100;
  const badness = REVENUE_DEPTS.has(row.department) ? -pct : pct;
  return {dollar, pct, badness};
}
function enrichData(rows) { return rows.map(r=>({...r,...calcVariance(r)})); }

function getTrendFlags(enriched) {
  const byDept = {};
  enriched.forEach(r=>{if(!byDept[r.department])byDept[r.department]=[];byDept[r.department].push(r);});
  const flagged = new Set();
  Object.values(byDept).forEach(rows=>{
    const sorted=[...rows].sort((a,b)=>(MONTH_ORDER[a.month]||99)-(MONTH_ORDER[b.month]||99));
    let streak=0;
    sorted.forEach((r,i)=>{
      if(r.badness>5){streak++;if(streak>=2){flagged.add(`${r.department}|${r.month}`);flagged.add(`${sorted[i-1].department}|${sorted[i-1].month}`);}}
      else streak=0;
    });
  });
  return flagged;
}

function fmt$(n){const a=Math.abs(n),s=n<0?"-":"+";if(a>=1e6)return s+"$"+(a/1e6).toFixed(2)+"M";if(a>=1e3)return s+"$"+(a/1e3).toFixed(1)+"K";return s+"$"+a.toLocaleString();}
function fmtPct(n){return(n>=0?"+":"")+n.toFixed(1)+"%";}
function fmtBig(n){return"$"+Math.abs(n).toLocaleString();}

// ── Smart CSV Parser ─────────────────────────────────────────
function parseCSV(text) {
  const rawLines = text.replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n");
  function tokenize(line) {
    const sep=line.includes("\t")?"\t":line.includes(";")?";":","
    const tokens=[];let cur="",inQ=false;
    for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){inQ=!inQ;continue;}if(!inQ&&c===sep){tokens.push(cur.trim());cur="";continue;}cur+=c;}
    tokens.push(cur.trim());return tokens;
  }
  function parseNum(s){
    if(!s)return NaN;s=String(s).trim().replace(/[$€£¥\s]/g,"");
    const neg=s.startsWith("(")&&s.endsWith(")");s=s.replace(/[()]/g,"");
    let mul=1;if(/[Mm]$/.test(s)){mul=1e6;s=s.replace(/[Mm]$/,"");}else if(/[Kk]$/.test(s)){mul=1e3;s=s.replace(/[Kk]$/,"");}
    s=s.replace(/,/g,"");const n=parseFloat(s)*mul;return isNaN(n)?NaN:(neg?-n:n);
  }
  const MN=["jan","feb","mar","apr","may","jun","jul","aug","sep","oct","nov","dec"];
  const ML=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const QM={q1:"Mar",q2:"Jun",q3:"Sep",q4:"Dec"};
  function normalizeMonth(s){
    if(!s)return null;s=String(s).trim().toLowerCase().replace(/[^a-z0-9]/g,"");
    if(/^q[1-4]$/.test(s))return QM[s];
    for(let i=0;i<MN.length;i++)if(s.startsWith(MN[i]))return ML[i];
    const n=parseInt(s);if(!isNaN(n)&&n>=1&&n<=12)return ML[n-1];return null;
  }
  function scoreCols(headers){
    const h=headers.map(h=>String(h).toLowerCase().replace(/[^a-z]/g,""));
    function best(kws){let bi=-1,bs=-1;h.forEach((hh,i)=>{const sc=kws.reduce((s,k)=>s+(hh.includes(k)?k.length:0),0);if(sc>bs){bs=sc;bi=i;}});return bs>0?bi:-1;}
    return{dept:best(["department","dept","team","division","group","cost","center","bu"]),month:best(["month","period","mo","date","time","quarter"]),budget:best(["budget","plan","target","forecast","bud","planned"]),actual:best(["actual","actuals","real","result","spent","act","ytd","amount"])};
  }
  let headerIdx=-1,colMap={dept:-1,month:-1,budget:-1,actual:-1};
  for(let i=0;i<Math.min(rawLines.length,20);i++){
    const tokens=tokenize(rawLines[i]);if(tokens.length<2)continue;
    const scores=scoreCols(tokens);const found=Object.values(scores).filter(v=>v>=0).length;
    if(found>=3&&found>Object.values(colMap).filter(v=>v>=0).length){headerIdx=i;colMap=scores;}
  }
  const dataStart=headerIdx>=0?headerIdx+1:0;
  if(colMap.dept<0||colMap.budget<0||colMap.actual<0)colMap={dept:0,month:1,budget:2,actual:3};
  const rows=[];let lastDept="";
  for(let i=dataStart;i<rawLines.length;i++){
    const line=rawLines[i].trim();if(!line)continue;
    const cols=tokenize(line);if(cols.length<2)continue;
    if(/^\s*(total|subtotal|grand|sum|average|note|source|#)/i.test(line))continue;
    const rawDept=colMap.dept>=0?cols[colMap.dept]:"";
    const rawMonth=colMap.month>=0?cols[colMap.month]:"";
    const dept=rawDept.trim()||lastDept;if(dept)lastDept=dept;
    const month=normalizeMonth(rawMonth);
    const budget=parseNum(colMap.budget>=0?cols[colMap.budget]:"");
    const actual=parseNum(colMap.actual>=0?cols[colMap.actual]:"");
    if(isNaN(budget)||isNaN(actual))continue;if(!dept&&!month)continue;
    rows.push({department:dept||"Unknown",month:month||rawMonth||"?",budget,actual});
  }
  return rows;
}

function buildPrompt(enriched) {
  const h="Department         | Month | Budget      | Actual      | $ Variance  | % Variance";
  const d="-".repeat(80);
  const lines=enriched.map(r=>`${r.department.padEnd(18)} | ${r.month.padEnd(5)} | ${fmtBig(r.budget).padStart(10)} | ${fmtBig(r.actual).padStart(10)} | ${fmt$(r.dollar).padStart(10)} | ${fmtPct(r.pct).padStart(8)}`);
  return`${h}\n${d}\n${lines.join("\n")}`;
}

const SYSTEM_PROMPT = `You are a senior FP&A analyst at a SaaS company using Snowflake Cortex. You write like a CFO expects — direct, specific, no filler. Always cite exact dollar amounts and percentages. Return ONLY a valid JSON object with exactly these fields:
{

  "risk_flags": [{ "flag": string, "impact": string, "urgency": "immediate"|"watch"|"monitor" }],

}
Return only valid JSON. No markdown fences. No commentary outside the JSON.`;

function DataInput({usingDemo, onUseDemo, onCSVUpload}) {
  const ref = React.useRef();
  function handleFile(e) {
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{const rows=parseCSV(ev.target.result);if(!rows.length){alert("Could not parse CSV.");return;}onCSVUpload(rows);};
    reader.readAsText(file);e.target.value="";
  }
  return (
    <div className="flex flex-wrap items-center gap-2">
      <button onClick={onUseDemo} className={`px-4 py-2 rounded-lg text-sm font-semibold transition-all ${usingDemo?"btn-primary":"glass glass-hover"}`} style={usingDemo?{}:{color:"#94a3b8"}}>
        📊 Demo Data
      </button>
      <button onClick={()=>ref.current.click()} className={`px-4 py-2 rounded-lg text-sm font-semibold transition-all ${!usingDemo?"btn-primary":"glass glass-hover"}`} style={!usingDemo?{}:{color:"#94a3b8"}}>
        📁 Upload CSV
      </button>
      <input ref={ref} type="file" accept=".csv,text/csv" className="hidden" onChange={handleFile}/>
      <span className="text-xs" style={{color:"#334155"}}>Any format · any column order · messy data ok</span>
    </div>
  );
}

function SortIcon({col,sortCol,sortDir}) {
  if(sortCol!==col)return<span className="ml-1 opacity-30 text-xs">⇅</span>;
  return<span className="ml-1 text-xs" style={{color:SB}}>{sortDir==="asc"?"↑":"↓"}</span>;
}

function VarianceTable({data, analysisRows}) {
  const [sortCol,setSortCol]=React.useState("badness");
  const [sortDir,setSortDir]=React.useState("desc");
  const enriched=React.useMemo(()=>enrichData(data),[data]);
  const trendFlags=React.useMemo(()=>getTrendFlags(enriched),[enriched]);
  function handleSort(col){if(sortCol===col)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortCol(col);setSortDir("desc");}}
  const sorted=React.useMemo(()=>[...enriched].sort((a,b)=>{let av=a[sortCol],bv=b[sortCol];if(typeof av==="string"){av=av.toLowerCase();bv=bv.toLowerCase();}return sortDir==="asc"?(av<bv?-1:av>bv?1:0):(av>bv?-1:av<bv?1:0);}), [enriched,sortCol,sortDir]);

  const COLS=[
    {key:"department",label:"Department"},
    {key:"month",label:"Month"},
    {key:"budget",label:"Budget",align:"right"},
    {key:"actual",label:"Actual",align:"right"},
    {key:"dollar",label:"$ Variance",align:"right"},
    {key:"pct",label:"% Variance",align:"right"},
    {key:"trend",label:"",align:"center",noSort:true},
  ];

  function badgeCls(badness){
    if(badness>5)return{bg:"rgba(239,68,68,0.15)",color:"#f87171",border:"rgba(239,68,68,0.3)"};
    if(badness>2)return{bg:"rgba(234,179,8,0.12)",color:"#facc15",border:"rgba(234,179,8,0.25)"};
    return{bg:"rgba(74,222,128,0.1)",color:"#4ade80",border:"rgba(74,222,128,0.2)"};
  }

  return (
    <div className="rounded-2xl overflow-hidden glass" style={{border:"1px solid rgba(41,181,232,0.12)"}}>
      <div className="overflow-x-auto">
        <table className="w-full data-table" style={{borderCollapse:"collapse",fontSize:"13px"}}>
          <thead>
            <tr style={{background:"rgba(7,13,22,0.9)",borderBottom:"1px solid rgba(41,181,232,0.12)"}}>
              {COLS.map(c=>(
                <th key={c.key} onClick={()=>!c.noSort&&handleSort(c.key)}
                  className={`px-5 py-3.5 font-semibold ${c.align==="right"?"text-right":c.align==="center"?"text-center":"text-left"}`}
                  style={{color:"#475569",fontSize:"11px",letterSpacing:".07em",textTransform:"uppercase"}}>
                  {c.label}{!c.noSort&&<SortIcon col={c.key} sortCol={sortCol} sortDir={sortDir}/>}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {sorted.map((row,i)=>{
              const key=`${row.department}|${row.month}`;
              const isAI=analysisRows.has(key);
              const isTrend=trendFlags.has(key);
              const bc=badgeCls(row.badness);
              return(
                <tr key={i} className={isAI?"flagged-row":""} style={{borderBottom:"1px solid rgba(255,255,255,0.04)",background:isAI?"rgba(41,181,232,0.05)":i%2===0?"transparent":"rgba(255,255,255,0.015)"}}>
                  <td className="px-5 py-3 font-semibold" style={{color:"#cbd5e1"}}>{row.department}</td>
                  <td className="px-5 py-3" style={{color:"#64748b"}}>{row.month}</td>
                  <td className="px-5 py-3 text-right" style={{color:"#94a3b8"}}>{fmtBig(row.budget)}</td>
                  <td className="px-5 py-3 text-right" style={{color:"#cbd5e1",fontWeight:500}}>{fmtBig(row.actual)}</td>
                  <td className={`px-5 py-3 text-right font-semibold`} style={{color:row.dollar<0?"#f87171":"#4ade80"}}>{fmt$(row.dollar)}</td>
                  <td className="px-5 py-3 text-right">
                    <span className="pill" style={{background:bc.bg,color:bc.color,border:`1px solid ${bc.border}`}}>{fmtPct(row.pct)}</span>
                  </td>
                  <td className="px-5 py-3 text-center text-sm">{isTrend?"🔴":""}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function TrendChip({t}) {

  const c=map[t]||map.stable;
  return<span className="text-xs font-semibold" style={{color:c.color}}>{c.icon} {t}</span>;
}

function AnalysisPanel({data, onAnalysisDone, analysisResult, setAnalysisResult}) {
  const [status,setStatus]=React.useState("idle");
  const [errorMsg,setErrorMsg]=React.useState("");
  const [copied,setCopied]=React.useState(false);

  async function runAnalysis() {
    setStatus("loading");setErrorMsg("");setAnalysisResult(null);
    const enriched=enrichData(data);
    try {
      const res=await fetch("/api/analyze",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"gpt-4o",max_tokens:3000,messages:[{role:"system",content:SYSTEM_PROMPT},{role:"user",content:buildPrompt(enriched)}]})});
      if(!res.ok){const e=await res.text();throw new Error(`API ${res.status}: ${e}`);}
      const json=await res.json();
      const raw=json.choices?.[0]?.message?.content||"";
      const text=raw.replace(/^```(?:json)?\s*/i,"").replace(/```\s*$/,"").trim();
      try{const parsed=JSON.parse(text);setAnalysisResult(parsed);onAnalysisDone(parsed);setStatus("done");}
      catch{setAnalysisResult({_raw:text});onAnalysisDone({});setStatus("done");}
    } catch(e){setErrorMsg(e.message);setStatus("error");}
  }

  function copyNarrative(){navigator.clipboard.writeText(analysisResult?.cfo_narrative||"").then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});}

  const r=analysisResult||{};

  return (
    <div className="glass rounded-2xl p-6" style={{border:"1px solid rgba(41,181,232,0.15)"}}>
      {/* Panel header */}
      <div className="flex items-center justify-between mb-6">
        <div>
          <div className="flex items-center gap-2 mb-1">
            <span className="text-lg">❄️</span>
            <h2 className="text-base font-bold text-white">Cortex AI Analysis</h2>
          </div>
          <p className="text-xs" style={{color:"#475569"}}>GPT-4o · Snowflake Cortex inference layer</p>
        </div>
        {status!=="loading" && (
          <button onClick={runAnalysis} className="btn-primary px-5 py-2.5 rounded-xl text-sm font-bold">
            {status==="done"?"↺ Re-run Analysis":"▶ Run Cortex Analysis"}
          </button>
        )}
      </div>

      {/* Idle */}
      {status==="idle" && (
        <div className="rounded-xl py-12 text-center" style={{border:"1px dashed rgba(41,181,232,0.12)"}}>
          <div className="text-3xl mb-3">❄️</div>
          <div className="text-sm font-medium text-slate-400">Click <strong style={{color:SB}}>Run Cortex Analysis</strong> to generate deep AI insights</div>
          <div className="text-xs mt-1" style={{color:"#334155"}}>Anomalies · Root causes · Dept trends · CFO narrative</div>
        </div>
      )}

      {/* Loading */}
      {status==="loading" && (
        <div className="rounded-xl py-14 text-center" style={{border:"1px dashed rgba(41,181,232,0.12)"}}>
          <div className="spin text-3xl mb-4">❄️</div>
          <div className="text-sm font-semibold mb-1" style={{color:SB}}>Cortex is analyzing your variance data…</div>
          <div className="text-xs" style={{color:"#334155"}}>Running inference on Snowflake Cortex</div>
        </div>
      )}

      {/* Error */}
      {status==="error" && (
        <div className="rounded-xl p-5" style={{background:"rgba(239,68,68,0.06)",border:"1px solid rgba(239,68,68,0.2)"}}>
          <div className="text-sm font-bold text-red-400 mb-1">⚠ Analysis failed</div>
          <div className="text-xs text-red-300/60 mb-4 break-all font-mono">{errorMsg}</div>
          <button onClick={runAnalysis} className="px-4 py-2 rounded-lg text-xs font-bold" style={{background:"rgba(239,68,68,0.12)",color:"#f87171",border:"1px solid rgba(239,68,68,0.25)"}}>Retry</button>
        </div>
      )}

      {/* Results */}
      {status==="done" && analysisResult && (
        <div className="space-y-4 fade-up">
          {r._raw ? (
            <div className="rounded-xl p-4" style={{background:"rgba(234,179,8,0.06)",border:"1px solid rgba(234,179,8,0.2)"}}>
              <div className="text-xs text-yellow-400 mb-2 font-semibold">⚠ Raw response — JSON parse failed</div>
              <pre className="text-xs text-slate-300 whitespace-pre-wrap overflow-auto max-h-64">{r._raw}</pre>
            </div>
          ) : (<>

            {/* Health bar */}
            {r.summary && (() => {
              const s=r.summary;
              const hc=s.overall_health==="on-track"?"#4ade80":s.overall_health==="at-risk"?"#facc15":"#f87171";
              const hb=s.overall_health==="on-track"?"rgba(74,222,128,0.08)":s.overall_health==="at-risk"?"rgba(234,179,8,0.08)":"rgba(239,68,68,0.08)";
              const hborder=s.overall_health==="on-track"?"rgba(74,222,128,0.2)":s.overall_health==="at-risk"?"rgba(234,179,8,0.2)":"rgba(239,68,68,0.2)";
              return(
                <div className="rounded-xl p-4 flex flex-wrap gap-6 items-center" style={{background:hb,border:`1px solid ${hborder}`}}>
                  <div>
                    <div className="text-xs mb-1.5" style={{color:"#64748b"}}>Overall Health</div>
                    <span className="pill text-sm font-bold px-3 py-1" style={{background:"rgba(0,0,0,0.3)",color:hc,border:`1px solid ${hc}44`}}>{s.overall_health?.toUpperCase()}</span>
                  </div>
                  {[
                    {label:"Net Variance",value:`${s.net_variance_dollar>=0?"+":"-"}$${Math.abs(s.net_variance_dollar||0).toLocaleString()}`,sub:`${s.net_variance_pct>=0?"+":""}${(s.net_variance_pct||0).toFixed(1)}%`,color:s.net_variance_dollar>=0?"#4ade80":"#f87171"},
                    {label:"Worst Dept",value:s.worst_department,color:"#f87171"},
                    {label:"Best Dept",value:s.best_department,color:"#4ade80"},
                  ].map((x,i)=>(
                    <div key={i}>
                      <div className="text-xs mb-1" style={{color:"#64748b"}}>{x.label}</div>
                      <div className="text-sm font-bold" style={{color:x.color}}>{x.value}<span className="text-xs font-normal ml-1" style={{color:"#475569"}}>{x.sub}</span></div>
                    </div>
                  ))}
                </div>
              );
            })()}

            {/* 2-col grid: Anomalies + Root Causes */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <SectionCard title="Anomalies Detected" icon="🔍">
                <div className="space-y-3">
                  {(r.anomalies||[]).map((a,i)=>(
                    <div key={i} className="rounded-xl p-3.5" style={{background:"rgba(7,13,22,0.6)",border:"1px solid rgba(255,255,255,0.05)"}}>
                      <div className="flex flex-wrap items-center gap-2 mb-1.5">
                        <span className="text-xs font-bold text-slate-100">{a.title||a}</span>
                        {a.severity&&<SeverityBadge s={a.severity}/>}
                      </div>
                      {a.department&&<div className="text-xs mb-1.5" style={{color:"#475569"}}>{a.department} · {a.month}</div>}
                      {a.detail&&<p className="text-xs leading-relaxed" style={{color:"#94a3b8"}}>{a.detail}</p>}
                    </div>
                  ))}
                </div>
              </SectionCard>

              <SectionCard title="Root Cause Analysis" icon="🧠">
                <div className="space-y-3">
                  {(r.root_causes||[]).map((rc,i)=>(
                    <div key={i} className="rounded-xl p-3.5" style={{background:"rgba(7,13,22,0.6)",border:"1px solid rgba(255,255,255,0.05)"}}>
                      <div className="flex flex-wrap items-center gap-2 mb-2">
                        <span className="text-xs font-bold" style={{color:SB}}>{rc.department}</span>
                        <span style={{color:"#1e3a5f"}}>·</span>
                        <span className="text-xs" style={{color:"#64748b"}}>{rc.month}</span>
                        {rc.variance_dollar!==undefined&&<span className={`text-xs font-semibold ml-auto ${rc.variance_dollar<0?"text-red-400":"text-green-400"}`}>{rc.variance_dollar>=0?"+":"-"}${Math.abs(rc.variance_dollar||0).toLocaleString()}</span>}
                        {rc.confidence&&<ConfidenceDot c={rc.confidence}/>}
                      </div>
                      <p className="text-xs leading-relaxed mb-2" style={{color:"#94a3b8"}}>{rc.hypothesis}</p>
                      {(rc.contributing_factors||[]).length>0&&(
                        <div className="flex flex-wrap gap-1.5">
                          {rc.contributing_factors.map((f,j)=>(
                            <span key={j} className="px-2 py-0.5 rounded-md text-xs" style={{background:"rgba(41,181,232,0.08)",color:"#64748b",border:"1px solid rgba(41,181,232,0.12)"}}>{f}</span>
                          ))}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </SectionCard>
            </div>

            {/* Department Insights */}
            {(r.department_insights||[]).length>0&&(
              <SectionCard title="Department Insights" icon="📈">
                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3">
                  {(r.department_insights||[]).map((d,i)=>(
                    <div key={i} className="rounded-xl p-3.5" style={{background:"rgba(7,13,22,0.6)",border:"1px solid rgba(255,255,255,0.05)"}}>
                      <div className="flex items-center justify-between mb-2">
                        <span className="text-xs font-bold text-slate-100">{d.department}</span>
                        <TrendChip t={d.trend}/>
                      </div>
                      <p className="text-xs leading-relaxed mb-2.5" style={{color:"#64748b"}}>{d.insight}</p>
                      {d.action&&<div className="text-xs rounded-lg px-2.5 py-1.5 font-medium" style={{background:"rgba(41,181,232,0.07)",color:SB,border:"1px solid rgba(41,181,232,0.12)"}}>→ {d.action}</div>}
                    </div>
                  ))}
                </div>
              </SectionCard>
            )}

            {/* 2-col: Risk + Recommendations */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <SectionCard title="Risk Flags" icon="🚩" accent="rgba(239,68,68,0.15)">
                <div className="space-y-3">
                  {(r.risk_flags||[]).map((rf,i)=>(
                    <div key={i} className="rounded-xl p-3.5" style={{background:"rgba(239,68,68,0.04)",border:"1px solid rgba(239,68,68,0.1)"}}>
                      <div className="flex items-start gap-2 mb-1.5">
                        <span className="text-red-400 shrink-0 mt-0.5 text-xs">▸</span>
                        <div className="flex-1">
                          <div className="flex flex-wrap items-center gap-2 mb-1">
                            <span className="text-xs font-semibold text-slate-200">{rf.flag||rf}</span>
                            {rf.urgency&&<UrgencyBadge u={rf.urgency}/>}
                          </div>
                          {rf.impact&&<p className="text-xs leading-relaxed" style={{color:"#64748b"}}>{rf.impact}</p>}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </SectionCard>

              <SectionCard title="Recommended Actions" icon="✅" accent="rgba(74,222,128,0.12)">
                <div className="space-y-3">
                  {(r.recommendations||[]).map((rec,i)=>(
                    <div key={i} className="rounded-xl p-3.5 flex gap-3" style={{background:"rgba(74,222,128,0.04)",border:"1px solid rgba(74,222,128,0.08)"}}>
                      <div className="w-7 h-7 rounded-lg flex items-center justify-center text-xs font-bold shrink-0" style={{background:"rgba(74,222,128,0.12)",color:"#4ade80",border:"1px solid rgba(74,222,128,0.2)"}}>{rec.priority||i+1}</div>
                      <div>
                        <div className="text-xs font-semibold text-slate-100 mb-1">{rec.action}</div>
                        <div className="flex flex-wrap gap-3 text-xs" style={{color:"#475569"}}>
                          {rec.owner&&<span>👤 {rec.owner}</span>}
                          {rec.expected_impact&&<span>🎯 {rec.expected_impact}</span>}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </SectionCard>
            </div>

            {/* CFO Narrative */}
            <SectionCard title="CFO Narrative" icon="📋" accent="rgba(41,181,232,0.15)">
              <div className="rounded-xl p-5 mb-3 text-sm leading-relaxed" style={{background:"rgba(7,13,22,0.7)",border:"1px solid rgba(41,181,232,0.1)",color:"#cbd5e1",lineHeight:1.8}}>{r.cfo_narrative}</div>
              <button onClick={copyNarrative} className="w-full py-2 rounded-xl text-xs font-bold transition-all" style={{background:copied?"rgba(74,222,128,0.12)":"rgba(41,181,232,0.08)",color:copied?"#4ade80":SB,border:`1px solid ${copied?"rgba(74,222,128,0.25)":"rgba(41,181,232,0.2)"}`}}>
                {copied?"✓ Copied to clipboard":"Copy to Clipboard"}
              </button>
            </SectionCard>
          </>)}
        </div>
      )}
    </div>
  );
}

function StickyBar({enrichedData, cfoNarrative}) {
  const [c1,setC1]=React.useState(false);
  const [c2,setC2]=React.useState(false);

  function copyNarr(){if(!cfoNarrative)return;navigator.clipboard.writeText(cfoNarrative).then(()=>{setC1(true);setTimeout(()=>setC1(false),2000);});}
  function dlCSV(){
    const h="Department,Month,Budget,Actual,$ Variance,% Variance\n";
    const rows=enrichedData.map(r=>`${r.department},${r.month},${r.budget},${r.actual},${r.dollar},${r.pct.toFixed(2)}%`).join("\n");
    const a=Object.assign(document.createElement("a"),{href:URL.createObjectURL(new Blob([h+rows],{type:"text/csv"})),download:`fpa_variance_${new Date().toISOString().slice(0,10)}.csv`});
    a.click();setC2(true);setTimeout(()=>setC2(false),2000);
  }
  function exportHTML(){
    const date=new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
    const trs=enrichedData.map(r=>`<tr><td>${r.department}</td><td>${r.month}</td><td>$${r.budget.toLocaleString()}</td><td>$${r.actual.toLocaleString()}</td><td style="color:${r.dollar<0?"#dc2626":"#16a34a"}">${fmt$(r.dollar)}</td><td>${fmtPct(r.pct)}</td></tr>`).join("");
    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>FP&A Executive Summary</title><style>body{font-family:Arial,sans-serif;max-width:960px;margin:48px auto;color:#1e293b;padding:0 24px}h1{font-size:24px;font-weight:800;color:#0f172a}p.sub{font-size:13px;color:#64748b;margin:4px 0 36px}table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:36px}th{background:#0d1520;color:#fff;padding:10px 14px;text-align:left;font-weight:600;font-size:11px;letter-spacing:.07em;text-transform:uppercase}td{padding:9px 14px;border-bottom:1px solid #e2e8f0}tr:nth-child(even) td{background:#f8fafc}.narr{background:#f0fdf4;border-left:4px solid #16a34a;padding:18px 22px;border-radius:6px;font-size:14px;line-height:1.75;color:#1e293b}.footer{margin-top:56px;font-size:11px;color:#94a3b8;text-align:center;border-top:1px solid #e2e8f0;padding-top:16px}</style></head><body><h1>❄️ Cortex FP&A — Variance Executive Summary</h1><p class="sub">Generated ${date} · Powered by Snowflake Cortex · Built by ${AUTHOR_NAME}</p><table><thead><tr><th>Department</th><th>Month</th><th>Budget</th><th>Actual</th><th>$ Variance</th><th>% Variance</th></tr></thead><tbody>${trs}</tbody></table>${cfoNarrative?`<div class="narr"><strong>CFO Narrative</strong><br/><br/>${cfoNarrative}</div>`:""}<div class="footer">Built with Snowflake Cortex ❄️ and Claude AI · <a href="${AUTHOR_LINKEDIN}">${AUTHOR_NAME}</a></div></body></html>`;
    const a=Object.assign(document.createElement("a"),{href:URL.createObjectURL(new Blob([html],{type:"text/html"})),download:`fpa_executive_summary_${new Date().toISOString().slice(0,10)}.html`});
    a.click();
  }

  const btn="px-4 py-2 rounded-lg text-xs font-bold transition-all hover:opacity-90 active:scale-95 glass glass-hover";
  return(
    <div className="sticky-bar px-6 py-3 flex items-center gap-3" style={{background:"rgba(7,13,22,0.9)",borderTop:"1px solid rgba(41,181,232,0.1)"}}>
      <span className="text-xs mr-1 hidden sm:block" style={{color:"#334155"}}>Export</span>
      <button onClick={copyNarr} disabled={!cfoNarrative} className={btn} style={{color:c1?"#4ade80":"#64748b",opacity:cfoNarrative?1:0.35}}>{c1?"✓ Copied":"📋 CFO Narrative"}</button>
      <button onClick={dlCSV} className={btn} style={{color:c2?"#4ade80":"#64748b"}}>{c2?"✓ Downloaded":"⬇ Download CSV"}</button>
      <button onClick={exportHTML} className={btn} style={{color:"#64748b"}}>📄 Export Summary</button>
      <div className="ml-auto text-xs hidden md:block" style={{color:"#1e3a5f"}}>❄️ Snowflake Cortex FP&amp;A</div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────
function App() {
  const [data,setData]=React.useState(DEMO_DATA);
  const [usingDemo,setUsingDemo]=React.useState(true);
  const [analysisResult,setAnalysisResult]=React.useState(null);
  const [analysisRows,setAnalysisRows]=React.useState(new Set());

  function useDemo(){setData(DEMO_DATA);setUsingDemo(true);setAnalysisResult(null);setAnalysisRows(new Set());}
  function uploadCSV(rows){setData(rows);setUsingDemo(false);setAnalysisResult(null);setAnalysisRows(new Set());}
  function onAnalysisDone(result){
    const rows=new Set();
    (result.anomalies||[]).forEach(a=>{data.forEach(r=>{if(String(a.title||a).toLowerCase().includes(r.department.toLowerCase())&&String(a.title||a).toLowerCase().includes(r.month.toLowerCase()))rows.add(`${r.department}|${r.month}`);});});
    (result.root_causes||[]).forEach(rc=>rows.add(`${rc.department}|${rc.month}`));
    setAnalysisRows(rows);
  }

  const enriched=React.useMemo(()=>enrichData(data),[data]);
  const totalBudget=enriched.reduce((s,r)=>s+r.budget,0);
  const totalActual=enriched.reduce((s,r)=>s+r.actual,0);
  const totalDelta=totalActual-totalBudget;
  const redCount=enriched.filter(r=>r.badness>5).length;
  const cfoNarrative=analysisResult?.cfo_narrative||"";

  return(
    <div className="min-h-screen pb-20">
      <Header/>
      <main className="max-w-7xl mx-auto px-4 sm:px-6 py-8 space-y-6">

        {/* Top bar */}
        <div className="glass rounded-2xl p-4 flex flex-wrap items-center justify-between gap-4 fade-up">
          <div>
            <div className="text-xs font-bold uppercase tracking-widest mb-1" style={{color:SB}}>Data Source</div>
            <div className="text-xs" style={{color:"#475569"}}>Upload any CSV — column order and formatting don't matter</div>
          </div>
          <DataInput usingDemo={usingDemo} onUseDemo={useDemo} onCSVUpload={uploadCSV}/>
        </div>

        {/* Stats */}
        <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 fade-up-2">
          <StatCard label="Total Budget" value={"$"+(totalBudget/1e6).toFixed(2)+"M"} color="#94a3b8"/>
          <StatCard label="Total Actual" value={"$"+(totalActual/1e6).toFixed(2)+"M"} color={SB}/>
          <StatCard label="Net Variance" value={fmt$(totalDelta)} color={totalDelta>=0?"#4ade80":"#f87171"} sub={fmtPct(totalDelta/totalBudget*100)}/>
          <StatCard label="Red Variances" value={`${redCount} rows`} color={redCount>3?"#f87171":"#facc15"} sub="worse than −5%"/>
        </div>

        {/* Table */}
        <div className="fade-up-3">
          <div className="flex items-center justify-between mb-3">
            <div className="section-label">Budget vs. Actual</div>
            <div className="flex gap-3 text-xs" style={{color:"#334155"}}>
              <span className="flex items-center gap-1"><span className="pill" style={{background:"rgba(239,68,68,0.12)",color:"#f87171",border:"1px solid rgba(239,68,68,0.2)",fontSize:10}}>&gt;−5%</span> bad</span>
              <span className="flex items-center gap-1"><span className="pill" style={{background:"rgba(234,179,8,0.1)",color:"#facc15",border:"1px solid rgba(234,179,8,0.2)",fontSize:10}}>−2–5%</span> watch</span>
              <span className="flex items-center gap-1"><span className="pill" style={{background:"rgba(74,222,128,0.1)",color:"#4ade80",border:"1px solid rgba(74,222,128,0.2)",fontSize:10}}>&lt;2%</span> ok</span>
            </div>
          </div>
          <VarianceTable data={data} analysisRows={analysisRows}/>
        </div>

        {/* Analysis */}
        <div><div className="section-label">AI Analysis</div><AnalysisPanel data={data} onAnalysisDone={onAnalysisDone} analysisResult={analysisResult} setAnalysisResult={setAnalysisResult}/></div>
      </main>

      {/* Footer */}
      <footer className="text-center py-5 pb-20 space-y-1">
        <div className="text-xs" style={{color:"#1e3a5f"}}>Built with Snowflake Cortex ❄️ and Claude AI</div>
        <div className="text-xs"><a href={AUTHOR_LINKEDIN} target="_blank" rel="noreferrer" className="font-semibold hover:opacity-80 transition-opacity" style={{color:"#29B5E8"}}>{AUTHOR_NAME}</a></div>
      </footer>

      <StickyBar enrichedData={enriched} cfoNarrative={cfoNarrative}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
